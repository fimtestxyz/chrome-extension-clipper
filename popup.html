<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gobble</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Floating toolbar -->
  <div id="toolbar" class="toolbar">
    <button id="btn-selection" class="toolbar-btn" title="Extract selected text">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v18"/><path d="M8 7l4-4 4 4"/>
      </svg>
      <span>Selection</span>
    </button>
    <button id="btn-markdown" class="toolbar-btn active" title="Extract as Markdown">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16v16H4z"/><path d="M7 16V8l2 6 2-6v8"/><path d="M15 8v8"/>
      </svg>
      <span>Markdown</span>
    </button>
    <button id="btn-tables" class="toolbar-btn" title="Extract tables as CSV">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/>
      </svg>
      <span>Tables</span>
    </button>
    <button id="btn-images" class="toolbar-btn" title="Extract images as JSON">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5-8 8"/>
      </svg>
      <span>Images</span>
    </button>
    <button id="btn-links" class="toolbar-btn" title="Extract links as CSV">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <span>Links</span>
    </button>
    <button id="btn-settings" class="toolbar-btn" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>Settings</span>
    </button>
    <button id="btn-history" class="toolbar-btn" title="View capture history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
      </svg>
      <span>History</span>
    </button>
  </div>

  <!-- Main content area -->
  <div id="main" class="main">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="8" fill="url(#grad1)"/>
          <path d="M9 16h14M16 9v14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="grad1" x1="0" y1="0" x2="32" y2="32">
              <stop stop-color="#007AFF"/>
              <stop offset="1" stop-color="#5856D6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="page-info">
        <h1 id="page-title" class="page-title">Loading…</h1>
        <p id="page-url" class="page-url"></p>
      </div>
    </div>

    <!-- Extraction mode selector -->
    <div class="section">
      <h2 class="section-title">Extraction Mode</h2>
      <div class="mode-grid">
        <button class="mode-card active" data-format="markdown">
          <div class="mode-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16v16H4z"/><path d="M7 16V8l2 6 2-6v8"/></svg>
          </div>
          <span>Full Page</span>
          <small>Markdown</small>
        </button>
        <button class="mode-card" data-format="csv">
          <div class="mode-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>
          </div>
          <span>Tables</span>
          <small>CSV</small>
        </button>
        <button class="mode-card" data-format="json">
          <div class="mode-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 4H4v4h4v8h8v-4h4V4h-4v8H8V4z"/></svg>
          </div>
          <span>Structured</span>
          <small>JSON</small>
        </button>
        <button class="mode-card" data-format="text">
          <div class="mode-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
          </div>
          <span>Plain Text</span>
          <small>Readable</small>
        </button>
        <button class="mode-card" data-format="links">
          <div class="mode-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/></svg>
          </div>
          <span>Links</span>
          <small>CSV</small>
        </button>
        <button class="mode-card" data-format="images">
          <div class="mode-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5-8 8"/></svg>
          </div>
          <span>Images</span>
          <small>JSON</small>
        </button>
        <button class="mode-card" data-format="headings">
          <div class="mode-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 12h16M4 18h10"/><path d="M18 12v6"/></svg>
          </div>
          <span>Outline</span>
          <small>JSON</small>
        </button>
        <button class="mode-card" data-format="forms">
          <div class="mode-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h6M7 16h8"/></svg>
          </div>
          <span>Forms</span>
          <small>JSON</small>
        </button>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="section">
      <h2 class="section-title">Quick Actions</h2>
      <div class="action-row">
        <button id="btn-copy" class="action-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy to Clipboard
        </button>
        <button id="btn-download" class="action-btn primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
      </div>
    </div>

    <!-- Preview panel -->
    <div class="section" id="preview-section" style="display:none;">
      <h2 class="section-title">
        Preview
        <span id="preview-badge" class="badge"></span>
      </h2>
      <pre id="preview-content" class="preview-content"></pre>
    </div>

    <!-- Progress -->
    <div id="progress" class="progress" style="display:none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <p id="progress-text" class="progress-text">Extracting…</p>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <span id="status-indicator" class="status-dot offline"></span>
      <span id="status-text">Ready</span>
      <span id="stats" class="stats"></span>
    </div>
  </div>

  <!-- Settings panel (slide-in) -->
  <div id="settings-panel" class="panel" style="display:none;">
    <div class="panel-header">
      <h2>Settings</h2>
      <button id="btn-close-settings" class="close-btn">&times;</button>
    </div>
    <div class="panel-body">
      <label class="setting-row">
        <span>Sanitize noise elements</span>
        <input type="checkbox" id="pref-sanitize" checked>
      </label>
      <label class="setting-row">
        <span>Include metadata (YAML frontmatter)</span>
        <input type="checkbox" id="pref-metadata" checked>
      </label>
      <label class="setting-row">
        <span>Strip inline styles</span>
        <input type="checkbox" id="pref-strip-styles" checked>
      </label>
      <label class="setting-row">
        <span>Resolve relative URLs to absolute</span>
        <input type="checkbox" id="pref-abs-url" checked>
      </label>
      <div class="setting-row">
        <span>Default format</span>
        <select id="pref-default-format">
          <option value="markdown">Markdown</option>
          <option value="csv">CSV</option>
          <option value="json">JSON</option>
          <option value="text">Plain Text</option>
          <option value="links">Links</option>
          <option value="images">Images</option>
          <option value="headings">Headings</option>
          <option value="forms">Forms</option>
        </select>
      </div>
    </div>
    <div class="panel-footer">
      <button id="btn-save-settings" class="action-btn primary">Save</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
